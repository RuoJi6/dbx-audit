name: Fork Release

on:
  push:
    tags:
      - "fork-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example fork-v0.5.30-1"
        required: true

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          if ! echo "$TAG" | grep -Eq '^fork-v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '${TAG}' does not look like a release tag."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "DBX Audit ${TAG}" \
              --notes "Automated DBX Audit fork build for ${TAG}."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "DBX Audit ${TAG}" \
              --notes "Automated DBX Audit fork build for ${TAG}."
          fi

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libsecret-1-dev xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater artifacts for unsigned fork builds
        shell: bash
        run: |
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.bundle.createUpdaterArtifacts=false; fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');"

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          while IFS= read -r file; do
            cp "$file" "release-assets/${{ matrix.label }}-$(basename "$file")"
          done < <(
            find target src-tauri/target -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.dmg' -o \
              -name '*.msi' -o \
              -name '*.exe' \
            \) 2>/dev/null
          )
          if [ -z "$(ls -A release-assets)" ]; then
            echo "::error::No release assets were produced."
            exit 1
          fi
          ls -lh release-assets

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
