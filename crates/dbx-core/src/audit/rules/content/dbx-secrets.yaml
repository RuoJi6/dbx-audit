---
id: dbx-generic-token-content
info:
  name: Generic API Token
  severity: high
  tags: dbx,content,secret,token
dbx:
  target: content
  kind: token-secret
file:
  - extractors:
      - type: regex
        regex:
          - (?i)\b(?:ak|sk|token|secret|bearer|api[_-]?key)[a-z0-9_\-:=.]{8,}\b
---
id: dbx-jwt-content
info:
  name: JWT Token
  severity: high
  tags: dbx,content,secret,jwt
dbx:
  target: content
  kind: token-secret
file:
  - extractors:
      - type: regex
        regex:
          - (?i)\beyJ[A-Za-z0-9_/+\-]{10,}\.[A-Za-z0-9._/+\-]{10,}(?:\.[A-Za-z0-9._/+\-]{8,})?\b
---
id: dbx-cloud-key-content
info:
  name: Cloud Access Key
  severity: high
  tags: dbx,content,secret,cloud
dbx:
  target: content
  kind: cloud-credential
file:
  - extractors:
      - type: regex
        regex:
          - (?i)\b(?:access[-_]?key[-_]?(?:id|secret)|LTAI[a-z0-9]{12,20})\b
          - \b(A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b
---
id: dbx-auth-header-content
info:
  name: Authorization Header
  severity: high
  tags: dbx,content,secret,auth
dbx:
  target: content
  kind: token-secret
file:
  - extractors:
      - type: regex
        regex:
          - (?i)\b(?:basic|bearer)\s+[a-z0-9=:_+/.\-]{5,100}\b
---
id: dbx-password-assignment-content
info:
  name: Password Assignment
  severity: high
  tags: dbx,content,secret,password
dbx:
  target: content
  kind: password-secret
file:
  - extractors:
      - type: regex
        regex:
          - (?i)(?:"?[\.\w]{0,32}(?:pass|pwd|passwd|password)[\.\w]{0,32}"?\s*(?::|={1,3}|!={1,2})\s*["'][^"']+["']|["'][^"']+["']\s*(?::|={1,3}|!={1,2})\s*"?[\.\w]{0,32}(?:pass|pwd|passwd|password)[\.\w]{0,32}"?)
---
id: dbx-secret-assignment-content
info:
  name: Secret Assignment
  severity: high
  tags: dbx,content,secret,key
dbx:
  target: content
  kind: token-secret
file:
  - extractors:
      - type: regex
        regex:
          - (?i)(?:"?[\.\w]{0,32}(?:key|secret|token|config|auth|access|admin|ticket)[\.\w]{0,32}"?\s*(?::|={1,3}|!={1,2})\s*["'][^"']+["']|["'][^"']+["']\s*(?::|={1,3}|!={1,2})\s*"?[\.\w]{0,32}(?:key|secret|token|config|auth|access|admin|ticket)[\.\w]{0,32}"?)
---
id: openai-key
info:
  name: OpenAI API Key
  severity: high
  tags: file,keys,openai,token,ai
dbx:
  target: content
  kind: token-secret
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - \b(sk-[a-zA-Z0-9]{48})\b
---
id: private-key
info:
  name: Private Key Detect
  severity: high
  tags: file,keys,token
dbx:
  target: content
  kind: private-key
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - BEGIN OPENSSH PRIVATE KEY
          - BEGIN PRIVATE KEY
          - BEGIN RSA PRIVATE KEY
          - BEGIN DSA PRIVATE KEY
          - BEGIN EC PRIVATE KEY
          - BEGIN PGP PRIVATE KEY BLOCK
---
id: dbx-connection-string-content
info:
  name: Database Connection String
  severity: high
  tags: dbx,content,secret,connection-string
dbx:
  target: content
  kind: connection-string
file:
  - extractors:
      - type: regex
        regex:
          - (?i)\b(?:mysql|postgres|postgresql|mongodb|redis|oracle|sqlserver)://[^\s'"]{8,}
---
id: dbx-webhook-content
info:
  name: Webhook URL
  severity: high
  tags: dbx,content,secret,webhook
dbx:
  target: content
  kind: webhook
file:
  - extractors:
      - type: regex
        regex:
          - (?i)https://hooks\.[a-z0-9.\-]+/[^\s'"]{8,}
