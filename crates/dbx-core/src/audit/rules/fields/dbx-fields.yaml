---
id: dbx-phone-field
info:
  name: Phone Field
  severity: medium
  tags: dbx,field,pii,phone
dbx:
  target: field
  kind: phone
file:
  - extractors:
      - type: regex
        regex:
          - (?i)(phone|mobile|tel|手机号|手机)
